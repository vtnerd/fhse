name: ci

on:
  push:
    branches: [ "main", "release-*" ]
  pull_request:
    branches: [ "main", "release-*" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  APT_INSTALL_LINUX: 'apt -y install build-essential cmake git libcbor-dev libfido2-dev libsodium-dev'
  APT_SET_CONF: |
        echo "Acquire::Retries \"3\";"         | sudo tee -a /etc/apt/apt.conf.d/80-custom
        echo "Acquire::http::Timeout \"120\";" | sudo tee -a /etc/apt/apt.conf.d/80-custom
        echo "Acquire::ftp::Timeout \"120\";"  | sudo tee -a /etc/apt/apt.conf.d/80-custom
  BREW_INSTALL_MAC: 'HOMEBREW_NO_AUTO_UPDATE=1 brew install cmake libcbor libfido2 libsodium'
  CONFIGURE: '-B "$GITHUB_WORKSPACE/build" -DCMAKE_BUILD_TYPE=Release -DFHSE_TESTS=ON -S "$GITHUB_WORKSPACE"'
  BUILD: 'cmake --build "$GITHUB_WORKSPACE/build" -j$(nproc)'
  RUN: 'ctest --test-dir "$GITHUB_WORKSPACE/build" --output-on-failure'

jobs:
  sanitizer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread, undefined]
    steps:
      - name: Install Dependencies
        run: |
          ${{env.APT_SET_CONF}}
          sudo apt update
          sudo ${{env.APT_INSTALL_LINUX}}
      - name: Checkout FHSE Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure FHSE
        run: cmake -DFHSE_SANITIZER=${{matrix.sanitizer}} ${{env.CONFIGURE}}
      - name: Build FHSE
        run: ${{env.BUILD}}
      - name: Run Tests
        run: ${{env.RUN}}
  build-options:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        libsodium: [ON, OFF]
        libfido2: [ON, OFF]
    steps:
      - name: Install Dependencies
        run: |
          ${{env.APT_SET_CONF}}
          sudo apt update
          sudo apt-get -y install build-essential cmake libcbor-dev
      - name: Install libsodium
        if: matrix.libsodium == 'ON'
        run: sudo apt-get -y install libsodium-dev
      - name: Install libfido2
        if: matrix.libfido2 == 'ON'
        run: sudo apt-get -y install libfido2-dev
      - name: Checkout FHSE Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure FHSE
        run: cmake -DFHSE_USE_LIBSODIUM=${{matrix.libsodium}} -DFHSE_USE_LIBFIDO2=${{matrix.libfido2}} ${{env.CONFIGURE}}
      - name: Build FHSE
        run: ${{env.BUILD}}
  linux:
    runs-on: ubuntu-latest
    container: ${{matrix.distro}}
    strategy:
      fail-fast: false
      matrix:
        distro: [archlinux:base-devel, debian:bookworm-slim, debian:trixie-slim]
    steps:
      - name: Install Dependencies (Debian/apt)
        if: matrix.distro == 'debian:bookworm-slim' || matrix.distro == 'debian:trixie-slim'
        run: |
          apt update
          ${{env.APT_INSTALL_LINUX}}
      - name: Install Dependencies (Arch/pacman)
        if: matrix.distro == 'archlinux:base-devel'
        run: |
          sudo pacman --noconfirm -Syu
          sudo pacman --noconfirm -S cmake git libcbor libfido2 libsodium
      - name: Checkout FHSE Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure FHSE
        run: cmake ${{env.CONFIGURE}}
      - name: Build FHSE
        run: ${{env.BUILD}}
      - name: Run Tests
        run: ${{env.RUN}}
  unix:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26, ubuntu-22.04, ubuntu-24.04, ubuntu-22.04-arm, ubuntu-24.04-arm]
        lib: [shared, static]
    steps:
      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-22.04-arm' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          ${{env.APT_SET_CONF}}
          sudo apt update
          sudo ${{env.APT_INSTALL_LINUX}}
      - name: Install dependencies (MacOS)
        if: matrix.os == 'macos-15' || matrix.os == 'macos-26'
        run: ${{env.BREW_INSTALL_MAC}}
      - name: Checkout FHSE Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure FHSE (dynamic)
        if: matrix.lib == 'shared'
        run: cmake -DBUILD_SHARED_LIBS=ON ${{env.CONFIGURE}}
      - name: Configure FHSE (release)
        if: matrix.lib == 'static'
        run: cmake -DBUILD_SHARED_LIBS=OFF ${{env.CONFIGURE}}
      - name: Build FHSE
        run: ${{env.BUILD}}
      - name: Run Tests
        run: ${{env.RUN}}
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
    steps:
      - name: Install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            coreutils
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libcbor
            mingw-w64-x86_64-libfido2
            mingw-w64-x86_64-libsodium
      - name: Checkout FHSE Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure FHSE
        run: cmake ${{env.CONFIGURE}}
      - name: Build FHSE
        run: ${{env.BUILD}}
      - name: Run Tests
        run: ${{env.RUN}}
